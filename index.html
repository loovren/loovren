<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loovren</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#0f172a;
color:white;
overflow:hidden;
}

/* خلفية متحركة */

body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:linear-gradient(45deg,#2563eb,#9333ea,#06b6d4,#2563eb);
background-size:400% 400%;
animation:bg 15s ease infinite;
z-index:-1;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
text-align:center;
background:rgba(0,0,0,0.4);
padding:40px;
border-radius:20px;
backdrop-filter:blur(15px);
width:360px;
box-shadow:0 0 30px rgba(0,0,0,0.5);
}

.name{
font-size:34px;
font-weight:bold;
margin-bottom:10px;
}

.bio{
color:#e2e8f0;
margin-bottom:25px;
}

.links a{
display:block;
text-decoration:none;
background:#2563eb;
margin:12px 0;
padding:14px;
border-radius:12px;
color:white;
font-size:18px;
transition:0.25s;
}

.links a:hover{
transform:scale(1.07);
background:#1d4ed8;
box-shadow:0 0 15px #2563eb;
}

.links a:active{
transform:scale(0.95);
}

.visits{
margin-top:20px;
font-size:14px;
opacity:0.8;
}

.footer{
margin-top:10px;
font-size:12px;
opacity:0.6;
}

</style>
</head>

<body>

<div class="container">

<div class="name">Loovren</div>

<div class="bio">صانع محتوى تقني</div>

<div class="links">

<a href="https://www.instagram.com/loovren_/" target="_blank">
Instagram
</a>

<a href="https://x.com/Loovren_" target="_blank">
X (Twitter)
</a>

</div>

<div class="visits">
عدد الزيارات: <span id="counter">0</span>
</div>

<div class="footer">
© 2026 Loovren
</div>

</div>

<script>

/* عداد زيارات بسيط */

let count = localStorage.getItem("visitCount");

if(count === null){
count = 1;
}else{
count = Number(count) + 1;
}

localStorage.setItem("visitCount", count);

document.getElementById("counter").innerText = count;

</script>

</body>
</html>
