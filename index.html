<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مونوبولي أنمي - تجربة أولية</title>
<style>
  body { font-family: Arial, sans-serif; text-align: center; background: #f0f0f0; }
  #board { display: grid; grid-template-columns: repeat(5, 100px); grid-gap: 5px; margin: 20px auto; }
  .cell { width: 100px; height: 100px; background: #fff; border: 1px solid #333; display: flex; align-items: center; justify-content: center; position: relative; }
  .player { width: 20px; height: 20px; border-radius: 50%; position: absolute; top: 5px; left: 5px; }
  #controls { margin-top: 20px; }
</style>
</head>
<body>

<h1>مونوبولي أنمي - تجربة أولية</h1>

<div id="board"></div>

<div id="controls">
  <p>الدور الحالي: <span id="currentPlayer">1</span></p>
  <button onclick="rollDice()">رمي النرد</button>
  <p>النرد: <span id="diceResult">-</span></p>
</div>

<script>
// إعداد اللوحة
const board = document.getElementById("board");
const totalCells = 20; // لوحة مصغرة
for (let i = 0; i < totalCells; i++) {
  const cell = document.createElement("div");
  cell.className = "cell";
  cell.textContent = "مربع " + (i+1);
  board.appendChild(cell);
}

// إعداد اللاعبين
const players = [
  {name: "أنمي 1", color: "red", position: 0},
  {name: "أنمي 2", color: "blue", position: 0}
];

players.forEach((p, index) => {
  const el = document.createElement("div");
  el.className = "player";
  el.style.backgroundColor = p.color;
  el.id = "player"+index;
  board.children[0].appendChild(el);
});

let currentPlayerIndex = 0;

// وظيفة رمي النرد والتحريك
function rollDice() {
  const dice = Math.floor(Math.random() * 6) + 1;
  document.getElementById("diceResult").textContent = dice;
  
  // تحريك اللاعب
  const player = players[currentPlayerIndex];
  const oldPos = player.position;
  player.position = (player.position + dice) % totalCells;
  
  // إزالة عنصر اللاعب من المربع القديم
  const oldCell = board.children[oldPos];
  const playerEl = document.getElementById("player"+currentPlayerIndex);
  oldCell.removeChild(playerEl);
  
  // إضافة عنصر اللاعب إلى المربع الجديد
  const newCell = board.children[player.position];
  newCell.appendChild(playerEl);
  
  // تغيير الدور
  currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
  document.getElementById("currentPlayer").textContent = currentPlayerIndex + 1;
}
</script>

</body>
</html>
